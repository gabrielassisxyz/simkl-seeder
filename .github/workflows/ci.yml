name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # bin/ci runs the prose gate, which resolves a merge base to find the
          # lines this branch adds. A shallow clone has no base commit to reach.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Component tests run in a real browser (vitest-browser-svelte).
      - run: npx playwright install --with-deps chromium

      - env:
          # Empty on a push, where the fallback (origin/master) is the right base anyway.
          SLOP_GUARD_BASE: ${{ github.event.pull_request.base.sha }}
        run: ./bin/ci

  # Deterministic secret scan over full history, independent of the local hook.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          # Required by gitleaks-action@v2 to scan pull_request events.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
